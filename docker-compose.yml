# PrintParty — Gateway + Relay
#
# Quick start:
#   1. Copy .env.example to .env and fill in your APNs credentials
#   2. Place your .p8 key at relay/AuthKey.p8 (or set APNS_KEY_FILE)
#   3. docker compose up
#
# The gateway pairing code is printed to the logs:
#   docker compose logs gateway
#

services:
  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      - RELAY_URL=http://relay:8090
      - GATEWAY_NAME=${GATEWAY_NAME:-PrintParty Gateway}
    volumes:
      - gateway-data:/data
    restart: unless-stopped
    depends_on:
      - relay

  relay:
    build: ./relay
    ports:
      - "${RELAY_PORT:-8090}:8090"
    environment:
      - APNS_KEY_PATH=/run/secrets/apns_key
      - APNS_KEY_ID=${APNS_KEY_ID}
      - APNS_TEAM_ID=${APNS_TEAM_ID}
      - APNS_TOPIC=${APNS_TOPIC:-com.clengineering.PrintParty}
      - APNS_SANDBOX=${APNS_SANDBOX:-true}
    secrets:
      - apns_key
    restart: unless-stopped

secrets:
  apns_key:
    file: ${APNS_KEY_FILE:-./relay/AuthKey.p8}

volumes:
  gateway-data:
