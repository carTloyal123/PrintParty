    # ── Decoded payload schemas ──────────────────────────────────────

    PrinterStage:
      type: string
      enum:
        - idle
        - preparing
        - printing
        - paused
        - finishing
        - done
        - failed
        - canceled
        - offline
      description: |
        Normalized printer stage. Every vendor adapter maps to these values.
        - `idle` — No active job, printer is ready.
        - `preparing` — Heating bed/nozzle, homing, calibrating.
        - `printing` — Actively extruding / building layers.
        - `paused` — Job paused (user or error-triggered).
        - `finishing` — Retract, park head, cooldown.
        - `done` — Job completed successfully.
        - `failed` — Job failed due to an error.
        - `canceled` — Job was canceled by the user.
        - `offline` — Adapter lost contact with the printer.

    PrintJobState:
      type: object
      description: |
        Complete snapshot of a printer's current state. This is the normalized
        format produced by vendor adapters (e.g., Bambu Lab MQTT) and consumed
        by all UI surfaces (iOS app, Live Activities, widgets).

        Sent as the decoded payload of `stream.state` events and `printers.state`
        responses. All `Date` fields are ISO 8601 strings.
      required:
        - printerId
        - printerDisplayName
        - printerModel
        - stage
        - progressPercent
        - updatedAt
      properties:
        printerId:
          type: string
          format: uuid
          description: Stable UUID identifier for the printer.
          examples:
            - "A1B2C3D4-E5F6-7A8B-9C0D-E1F2A3B4C5D6"
        printerDisplayName:
          type: string
          description: Human-readable printer name set during registration.
          examples:
            - "Garage A1 Mini"
        printerModel:
          type: string
          description: Printer model string.
          examples:
            - "Bambu Lab A1 Mini"
        jobId:
          type: string
          format: uuid
          nullable: true
          description: Adapter-synthesized job identifier. Null when stage is idle.
          examples:
            - "12345678-9ABC-DEF0-1234-56789ABCDEF0"
        jobName:
          type: string
          nullable: true
          description: Job/file name reported by the printer.
          examples:
            - "benchy.gcode"
        stage:
          $ref: '#/components/schemas/PrinterStage'
        substageMessage:
          type: string
          nullable: true
          description: |
            Optional human-readable detail under the top-level stage. Set by
            vendor adapters when the printer reports a finer-grained activity,
            e.g., "Calibrating extrusion flow" while stage is preparing, or
            "Inspecting first layer" while stage is printing.
          examples:
            - "Inspecting first layer"
            - "Calibrating extrusion flow"
        progressPercent:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Job progress from 0.0 to 100.0.
          examples:
            - 42.5
        currentLayer:
          type: integer
          nullable: true
          description: Current layer number being printed.
          examples:
            - 85
        totalLayers:
          type: integer
          nullable: true
          description: Total number of layers in the job.
          examples:
            - 200
        startedAt:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp when the job started.
          examples:
            - "2026-06-03T10:00:00Z"
        estimatedEndAt:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 estimated completion timestamp.
          examples:
            - "2026-06-03T14:30:00Z"
        nozzleTempC:
          type: number
          format: double
          nullable: true
          description: Current nozzle temperature in Celsius.
          examples:
            - 220.0
        nozzleTargetC:
          type: number
          format: double
          nullable: true
          description: Target nozzle temperature in Celsius.
          examples:
            - 220.0
        bedTempC:
          type: number
          format: double
          nullable: true
          description: Current bed temperature in Celsius.
          examples:
            - 60.0
        bedTargetC:
          type: number
          format: double
          nullable: true
          description: Target bed temperature in Celsius.
          examples:
            - 60.0
        errorCode:
          type: string
          nullable: true
          description: Machine-readable error code when stage is failed.
          examples:
            - "0700_8001"
        errorMessage:
          type: string
          nullable: true
          description: Human-readable error description when stage is failed.
          examples:
            - "Nozzle temperature abnormal"
        updatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when this state snapshot was produced.
          examples:
            - "2026-06-03T12:34:56Z"

    # ── Method-specific payload schemas ──────────────────────────────

    EmptyPayload:
      type: object
      description: Empty payload for methods that require no input (health, printers.list).
      additionalProperties: false

    KeyRotatePayload:
      type: object
      description: |
        Payload for the key.rotate event. Contains the new group key encrypted
        with the recipient device's shared key.
      required:
        - encryptedGroupKey
        - groupKeyNonce
      properties:
        encryptedGroupKey:
          type: string
          format: byte
          description: |
            Base64-encoded AES-256-GCM ciphertext+tag of the new 32-byte group key,
            encrypted with the recipient's device shared key.
          examples:
            - "xYz123ABC..."
        groupKeyNonce:
          type: string
          format: byte
          description: Base64-encoded 12-byte nonce used for the group key encryption.
          examples:
            - "aBcDeFgHiJkL"

    HealthResponsePayload:
      type: object
      description: Gateway health and identity information.
      required:
        - status
        - version
        - gatewayId
        - gatewayName
        - time
        - printers
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
          description: |
            "ok" when at least one printer is reachable; "degraded" when all
            registered printers are offline.
          examples:
            - "ok"
        version:
          type: string
          description: Gateway software version.
          examples:
            - "0.1.0"
        gatewayId:
          type: string
          description: Unique gateway identifier.
          examples:
            - "gateway-001"
        gatewayName:
          type: string
          description: Human-readable gateway name.
          examples:
            - "Home Gateway"
        relayURL:
          type: string
          format: uri
          nullable: true
          description: Relay server URL if configured, null otherwise.
          examples:
            - "https://relay.printparty.app"
        time:
          type: string
          format: date-time
          description: Current gateway time (ISO 8601).
          examples:
            - "2026-06-03T12:34:56Z"
        printers:
          type: array
          description: Summary of each registered printer's connection status.
          items:
            $ref: '#/components/schemas/PrinterHealthSummary'

    PrinterHealthSummary:
      type: object
      description: Printer identity and connection status in the health response.
      required:
        - id
        - displayName
        - stage
      properties:
        id:
          type: string
          format: uuid
          examples:
            - "A1B2C3D4-E5F6-7A8B-9C0D-E1F2A3B4C5D6"
        displayName:
          type: string
          examples:
            - "Garage A1 Mini"
        stage:
          type: string
          description: Current stage as a string (from PrinterStage enum, or "unknown").
          examples:
            - "printing"

    PrinterSummary:
      type: object
      description: Printer summary returned by printers.list.
      required:
        - id
        - displayName
        - modelName
        - stage
        - progressPercent
      properties:
        id:
          type: string
          format: uuid
          examples:
            - "A1B2C3D4-E5F6-7A8B-9C0D-E1F2A3B4C5D6"
        displayName:
          type: string
          examples:
            - "Garage A1 Mini"
        modelName:
          type: string
          examples:
            - "Bambu Lab A1 Mini"
        stage:
          type: string
          description: Current stage as a string (from PrinterStage enum, or "unknown").
          examples:
            - "printing"
        progressPercent:
          type: number
          format: double
          minimum: 0
          maximum: 100
          examples:
            - 42.5

    PrintersStateRequestPayload:
      type: object
      description: Request payload for printers.state.
      required:
        - printerId
      properties:
        printerId:
          type: string
          format: uuid
          description: UUID of the printer to query.
          examples:
            - "A1B2C3D4-E5F6-7A8B-9C0D-E1F2A3B4C5D6"

    PrintersRegisterRequestPayload:
      type: object
      description: Request payload for printers.register.
      required:
        - displayName
        - modelName
        - host
        - serial
        - accessCode
      properties:
        displayName:
          type: string
          description: Human-readable name for the printer.
          examples:
            - "Garage A1 Mini"
        modelName:
          type: string
          description: Printer model identifier.
          examples:
            - "Bambu Lab A1 Mini"
        host:
          type: string
          description: IP address or hostname of the printer on the local network.
          examples:
            - "192.168.1.100"
        serial:
          type: string
          description: Printer serial number (used for Bambu MQTT authentication).
          examples:
            - "00M09A350100123"
        accessCode:
          type: string
          description: Printer access code (8-digit code from the printer's LCD).
          examples:
            - "12345678"

    PrintersRegisterResponsePayload:
      type: object
      description: Response payload for printers.register.
      required:
        - printerId
        - status
      properties:
        printerId:
          type: string
          format: uuid
          description: Assigned UUID for the newly registered printer.
          examples:
            - "A1B2C3D4-E5F6-7A8B-9C0D-E1F2A3B4C5D6"
        status:
          type: string
          const: registered
          examples:
            - "registered"

    PrintersRemoveRequestPayload:
      type: object
      description: Request payload for printers.remove.
      required:
        - printerId
      properties:
        printerId:
          type: string
          format: uuid
          description: UUID of the printer to unregister.
          examples:
            - "A1B2C3D4-E5F6-7A8B-9C0D-E1F2A3B4C5D6"

    PrintersRemoveResponsePayload:
      type: object
      description: Response payload for printers.remove.
      required:
        - status
      properties:
        status:
          type: string
          const: unregistered
          examples:
            - "unregistered"

    ActivitiesRegisterRequestPayload:
      type: object
      description: Request payload for activities.register.
      required:
        - printerId
        - pushToken
      properties:
        printerId:
          type: string
          format: uuid
          description: UUID of the printer to receive Live Activity updates for.
          examples:
            - "A1B2C3D4-E5F6-7A8B-9C0D-E1F2A3B4C5D6"
        pushToken:
          type: string
          description: Hex-encoded APNs push token from ActivityKit's pushTokenUpdates.
          examples:
            - "abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789"
        sharedKey:
          type: string
          format: byte
          nullable: true
          description: |
            Optional base64-encoded shared key for E2EE of push notification
            content-state. When present, the gateway encrypts the content-state
            with ChaCha20-Poly1305 before forwarding to APNs via the relay.
          examples:
            - "base64encodedkey..."

    ActivitiesRegisterResponsePayload:
      type: object
      description: Response payload for activities.register.
      required:
        - status
      properties:
        status:
          type: string
          const: registered
          examples:
            - "registered"

    PrinterCommandRequestPayload:
      type: object
      description: Request payload for printer.command.
      required:
        - printerId
        - command
      properties:
        printerId:
          type: string
          format: uuid
          description: UUID of the printer to command.
          examples:
            - "A1B2C3D4-E5F6-7A8B-9C0D-E1F2A3B4C5D6"
        command:
          type: string
          enum:
            - pause
            - resume
            - cancel
          description: |
            Control command to send to the printer.
            - `pause` — Pause the current print job.
            - `resume` — Resume a paused print job.
            - `cancel` — Cancel/stop the current print job.
          examples:
            - "pause"

    PrinterCommandResponsePayload:
      type: object
      description: Response payload for printer.command.
      required:
        - status
      properties:
        status:
          type: string
          const: sent
          description: Indicates the command was forwarded to the printer.
          examples:
            - "sent"

    ErrorPayload:
      type: object
      description: |
        Decoded payload of error envelopes. Contains a machine-readable code
        and a human-readable message.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: |
            Machine-readable error code. Known values:
            - `invalid_type` — Envelope type was not "request"
            - `unknown_method` — Unrecognized method string
            - `invalid_payload` — Payload could not be decoded
            - `not_found` — Referenced resource does not exist
            - `handler_error` — Unexpected error in the handler
          examples:
            - "unknown_method"
            - "not_found"
            - "invalid_payload"
        message:
          type: string
          description: Human-readable error description.
          examples:
            - "Unknown method: foo.bar"
            - "Printer not found: A1B2C3D4-E5F6-7A8B-9C0D-E1F2A3B4C5D6"

    # ── Relay encrypted frame schema (informational) ─────────────────

    EncryptedFrame:
      type: string
      description: |
        Wire format of an encrypted frame on the relay tunnel.

        **Gateway → Relay (with routing tag):**
        ```
        <routing-tag>:<base64-nonce>.<base64-ciphertext>
        ```

        **Client → Relay (no tag — relay prepends client UUID):**
        ```
        <base64-nonce>.<base64-ciphertext>
        ```

        **Client receives (tag stripped by relay):**
        ```
        <base64-nonce>.<base64-ciphertext>
        ```

        Components:
        - `routing-tag`: `*` for broadcast, or a client UUID for peer-to-peer
        - `base64-nonce`: Base64-encoded 12-byte AES-GCM nonce
        - `base64-ciphertext`: Base64-encoded ciphertext + 16-byte GCM auth tag

        The ciphertext decrypts to a complete JSON `MessageEnvelope`.
      examples:
        - "*:kJ3xQ2m9f8a7bCdE.p2vLmR8sT1nWqY4cX5zK7..."
        - "a1b2c3d4-e5f6-7a8b-9c0d-e1f2a3b4c5d6:rT5wYh8k.sN3mP9qR2..."
        - "kJ3xQ2m9f8a7bCdE.p2vLmR8sT1nWqY4cX5zK7..."

  # ════════════════════════════════════════════════════════════════════
  #  SECURITY SCHEMES
  # ════════════════════════════════════════════════════════════════════

  securitySchemes:
    relayApiKey:
      type: httpApiKey
      name: apiKey
      in: query
      description: |
        Gateway API key for relay tunnel authentication. Obtained by calling
        `POST /v1/gateways/register` on the relay server. Passed as a query
        parameter on the WebSocket upgrade request:
        `wss://relay/v1/tunnel/{gatewayId}/stream?apiKey=<key>`

        This is **not** used for message encryption — it only authorizes the
        gateway's tunnel connection to the relay.

# ════════════════════════════════════════════════════════════════════════
#  SECURITY (informational — not part of AsyncAPI schema)
# ════════════════════════════════════════════════════════════════════════
#
#  End-to-End Encryption (relay path only)
#  ─────────────────────────────────────────
#  Algorithm:      AES-256-GCM
#  Nonce:          12 bytes, random per message
#  Plaintext:      Full MessageEnvelope JSON (type, id, method, deviceId, payload)
#  AAD:            Empty (routing tag is relay metadata, not application data)
#  Wire format:    <base64(nonce)>.<base64(ciphertext + 16-byte auth tag)>
#
#  Key types:
#  ──────────
#  1. Device shared key (per device ↔ gateway pair)
#     - Created during LAN pairing via X25519 ECDH + HKDF
#     - Used for: encrypting requests (client → gateway) and
#       responses (gateway → client)
#     - Relay frames tagged with client UUID
#
#  2. Group key (per gateway, shared with all paired devices)
#     - Generated on first pairing (32 random bytes)
#     - Distributed encrypted with each device's shared key during pairing
#     - Used for: encrypting broadcast events (gateway → all clients)
#     - Relay frames tagged with `*`
#     - Rotated when a device is unpaired (forward secrecy)
#
#  3. Relay API key (per gateway ↔ relay)
#     - 32-byte hex token for tunnel authentication
#     - NOT used for encryption — only access control
#
#  Decryption strategy on iOS:
#  ───────────────────────────
#  Frame arrives as <nonce>.<ciphertext> (tag already stripped by relay).
#  1. Try group key → success = broadcast event (stream.state)
#  2. Try device shared key → success = response to our request
#  3. Both fail → discard (should not happen in normal operation)
#  Optimization: try device key first if pending requests exist.
#
#  Trust model:
#  ────────────
#  - Relay sees: gateway IDs, client UUIDs, routing tags, frame sizes, timing
#  - Relay CANNOT see: message type, method, request ID, payload content,
#    printer data, commands, push tokens (all inside ciphertext)
#  - Cross-client isolation: responses tagged per-client, encrypted with
#    per-device key. Client A never sees Client B's traffic.
#  - Device revocation: group key rotation on unpair — removed device
#    cannot decrypt future broadcast events.
#  - Replay protection: random 12-byte nonce per frame, GCM rejects reuse.
#
# ════════════════════════════════════════════════════════════════════════
